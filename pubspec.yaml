dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: launcher_icon
  ios: true
  image_path: "icons/ic_launcher-65afef1e1c371/android/playstore-icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "icons/ic_launcher-65afef1e1c371/android/ic_launcher-web.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"

flutter:
  uses-material-design: true

  assets:
    - assets/images/loading.png
    - assets/images/logo2.jpeg
    - assets/images/icon.png
    - assets/images/logo2.png
    - assets/images/radio-concep.jpeg
