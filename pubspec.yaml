name: RTEF
description: N'ap pote pawòl la.
publish_to: "none"

version: 1.1.8+74

environment:
  sdk: ">=3.0.5 <4.0.0"

dependencies:
  # audio_service: ^0.18.17
  chewie: ^1.8.5
  cupertino_icons: ^1.0.2
  flutter:
    sdk: flutter
  # flutter_native_splash: ^2.3.1
  google_fonts: ^6.2.1
  radio_player: ^2.2.1
  url_launcher: ^6.3.0
  rename: ^3.0.2
  video_player: ^2.9.2
  wakelock_plus: ^1.1.1
  webview_flutter: ^4.11.0
  webview_flutter_android: ^4.4.2
  webview_flutter_wkwebview: ^3.20.0
  flutter_svg: ^2.0.7
  shared_preferences: ^2.2.0
